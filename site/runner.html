<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velin example runner</title>
  <script src="https://unpkg.com/@velinjs/all/velin-all.min.js"></script>
  <!-- Playground examples were authored against Tailwind's browser build. -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #fff; color: #111;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    body { padding: 16px; }
    .runner-error {
      padding: 16px; background: #fff5f4; border: 1px solid #b3261e;
      color: #b3261e; border-radius: 6px; font-family: ui-monospace, Menlo, Consolas, monospace;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const params = new URLSearchParams(location.search);
    const markupUrl = params.get('markup');
    const stateUrl  = params.get('state');

    function showError(msg) {
      const el = document.getElementById('app');
      el.innerHTML = '';
      const div = document.createElement('div');
      div.className = 'runner-error';
      div.textContent = String(msg);
      el.appendChild(div);
    }

    (async () => {
      try {
        const app = document.getElementById('app');
        if (!markupUrl) throw new Error('runner.html: missing ?markup= URL');

        const html = await fetch(markupUrl).then(r => {
          if (!r.ok) throw new Error('markup fetch: HTTP ' + r.status);
          return r.text();
        });
        app.innerHTML = html;

        let state = {};
        if (stateUrl) {
          const mod = await import(stateUrl);
          state = typeof mod.default === 'function' ? mod.default() : (mod.default || {});
        }

        Velin.bind(app, state);
      } catch (err) {
        console.error(err);
        showError(err.stack || err.message || err);
      }
    })();
  </script>
</body>
</html>
