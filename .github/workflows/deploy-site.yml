# Builds the hand-rolled Velin site and deploys it to GitHub Pages.
#
# All build/stage logic lives in npm scripts (see `build:site` in package.json).
# The workflow only runs the script and hands the staged directory to the
# GitHub-provided Pages actions.
#
# Enable Pages under Settings → Pages → Source: GitHub Actions.

name: Deploy Site to Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'site/**'
      - 'docs/**'
      - 'playground/**'
      - 'logo.svg'
      - 'og-image.svg'
      - 'scripts/build.js'
      - 'scripts/prepare.js'
      - 'scripts/rasterize-og.js'
      - 'scripts/stage-site.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build:site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
