# Velin language-support CI + release.
#
# Runs tests on every PR that touches the workspace, then routes tag
# pushes to the right publisher:
#
#   lsp-v*         → npm publish @velin/lsp-server
#   vscode-ext-v*  → VS Code Marketplace + Open VSX + GitHub Release
#
# Required repository secrets:
#   NPM_TOKEN     — npm automation token with publish rights on @velin/*
#   VSCE_PAT      — Azure DevOps PAT for the `velin-framework` publisher
#   OVSX_TOKEN    — Open VSX access token for the `velin-framework` namespace

name: Language Support CI & Release

on:
  push:
    tags:
      - 'lsp-v*'
      - 'vscode-ext-v*'
  pull_request:
    paths:
      - 'tooling/velin-language-support/**'
      - '.github/workflows/release-extension.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: tooling/velin-language-support/package-lock.json

      - name: Install
        working-directory: tooling/velin-language-support
        run: npm ci

      - name: Build
        working-directory: tooling/velin-language-support
        run: npm run build

      - name: Test
        working-directory: tooling/velin-language-support
        run: npm test

  publish-lsp:
    needs: test
    if: startsWith(github.ref, 'refs/tags/lsp-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: tooling/velin-language-support/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        working-directory: tooling/velin-language-support
        run: npm ci

      - name: Build
        working-directory: tooling/velin-language-support
        run: npm run build

      - name: Publish @velin/lsp-server
        working-directory: tooling/velin-language-support/lsp-server
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-extension:
    needs: test
    if: startsWith(github.ref, 'refs/tags/vscode-ext-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: tooling/velin-language-support/package-lock.json

      - name: Install
        working-directory: tooling/velin-language-support
        run: npm ci

      - name: Build
        working-directory: tooling/velin-language-support
        run: npm run build

      - name: Package .vsix
        working-directory: tooling/velin-language-support/vscode-extension
        run: npx vsce package --no-dependencies

      - name: Publish to VS Code Marketplace
        working-directory: tooling/velin-language-support/vscode-extension
        run: npx vsce publish --no-dependencies --pat "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        working-directory: tooling/velin-language-support/vscode-extension
        run: npx ovsx publish --no-dependencies --pat "$OVSX_TOKEN"
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}

      - name: Create GitHub Release with .vsix
        uses: softprops/action-gh-release@v1
        with:
          files: tooling/velin-language-support/vscode-extension/*.vsix
          body: |
            ## Velin Language Support ${{ github.ref_name }}

            Published to:
            - [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=velin-framework.velin-language-support)
            - [Open VSX Registry](https://open-vsx.org/extension/velin-framework/velin-language-support)

            ### Manual install
            Download the `.vsix` and run `code --install-extension velin-language-support-*.vsix`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
