# Velin main library CI + release.
#
# Runs the build (which produces every bundle: velin-all, velin-common,
# velin-core, velin-standard, velin-templates-and-fragments, velin-router,
# velin-events) and the full test suite on PRs. On a `v*` tag, publishes
# the resulting publish/ directory to npm — this includes every bundle
# together, so consumers can pick which one they need.
#
# Auth: uses npm Trusted Publishing (OIDC). No NPM_TOKEN secret required.
# The `velin` package must have this repo + workflow registered as a Trusted
# Publisher on npmjs.com. See docs/releasing.md.

name: Main Library CI & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths-ignore:
      - 'tooling/**'
      - 'docs/**'
      - '.github/workflows/release-extension.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build (all bundles + types)
        run: npm run build

      - name: Verify every bundle was produced
        run: |
          set -e
          for name in velin-all velin-common velin-core velin-standard \
                      velin-templates-and-fragments velin-router velin-events; do
            for suffix in .min.js .min.js.map; do
              f="dist/build/$name$suffix"
              if [ ! -s "$f" ]; then
                echo "MISSING or empty: $f"
                exit 1
              fi
            done
          done
          echo "All 7 bundles present."

      - name: Report bundle sizes
        run: |
          printf '%-42s %8s %8s\n' bundle raw gzip
          for f in dist/build/velin-*.min.js; do
            raw=$(wc -c < "$f")
            gz=$(gzip -c "$f" | wc -c)
            printf '%-42s %8d %8d\n' "$(basename "$f")" "$raw" "$gz"
          done

      - name: Test
        run: npm test

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing requires npm >= 11.5.1; Node 20 ships with npm 10.x.
      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Stage publish/ directory
        run: npm run prepare:publish

      - name: Verify staged bundles
        run: |
          set -e
          for name in velin-all velin-common velin-core velin-standard \
                      velin-templates-and-fragments velin-router velin-events; do
            for suffix in .min.js .min.js.map .d.ts; do
              f="publish/$name$suffix"
              if [ ! -s "$f" ]; then
                echo "MISSING or empty: $f"
                exit 1
              fi
            done
          done

      - name: Publish to npm
        working-directory: publish
        run: npm publish --provenance --access public
